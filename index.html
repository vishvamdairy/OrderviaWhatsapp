<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>विश्वम डेअरी - Smart Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #f1f5f9; font-family: sans-serif; }
        .card { background: white; border-radius: 16px; padding: 15px; margin-bottom: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .hidden { display: none; }
    </style>
</head>
<body class="p-4">

    <div class="bg-blue-800 text-white p-6 rounded-2xl text-center mb-4 shadow-lg" onclick="adminTouch()">
        <h1 class="text-2xl font-black">VISHVAM DAIRY</h1>
    </div>

    <div id="customerView">
        <div class="card">
            <h2 class="font-bold text-gray-600 mb-4 border-b pb-2">🛒 Select Products</h2>
            <div id="itemsList" class="space-y-4">
                <div class="flex items-center gap-2">
                    <span class="w-1/3 text-sm font-bold">दूध (Milk)</span>
                    <input type="number" class="w-1/4 p-2 border rounded qty" data-name="दूध (Milk)" placeholder="Qty">
                    <select class="w-1/4 p-2 border rounded unit"><option value="L">L</option><option value="ml">ml</option></select>
                </div>
                <div class="flex items-center gap-2">
                    <span class="w-1/3 text-sm font-bold">पनीर (Paneer)</span>
                    <input type="number" class="w-1/4 p-2 border rounded qty" data-name="पनीर (Paneer)" placeholder="Qty">
                    <select class="w-1/4 p-2 border rounded unit"><option value="kg">kg</option><option value="gm">gm</option></select>
                </div>
                <div class="flex items-center gap-2">
                    <span class="w-1/3 text-sm font-bold">तूप (Ghee)</span>
                    <input type="number" class="w-1/4 p-2 border rounded qty" data-name="तूप (Ghee)" placeholder="Qty">
                    <select class="w-1/4 p-2 border rounded unit"><option value="kg">kg</option><option value="gm">gm</option></select>
                </div>
            </div>
        </div>

        <div class="card bg-green-50"><input type="text" id="coupon" placeholder="Coupn Code (Optional)" class="w-full p-2 border rounded text-center font-bold"></div>
        <div class="card space-y-2">
            <input type="text" id="name" placeholder="Name" class="w-full p-2 border rounded">
            <input type="text" id="phone" placeholder="Phone" class="w-full p-2 border rounded">
            <textarea id="loc" placeholder="Address" class="w-full p-2 border rounded"></textarea>
        </div>
        <button onclick="placeOrder()" class="w-full bg-blue-600 text-white p-4 rounded-xl font-bold">Confirm Order</button>
    </div>

    <div id="adminView" class="hidden text-center p-10 card">
        <h2 class="font-bold mb-4">Admin Mode</h2>
        <a href="https://docs.google.com/spreadsheets/u/0/d/1616EczZGBg1gpj83v4GkQUm3IAvLmhTX2VqBinKnjzo/htmlview" class="block bg-black text-white p-3 rounded mb-2">View Orders</a>
        <button onclick="location.reload()" class="underline">Exit</button>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbzyqJ7nj0ZUppQUKU6uxrJZoLx9zvKxfFBSGDQTMCrUqthhGiO4NxuOe2rbBU5imVeH/exec';
        const myWhatsApp = '918805223290';
        let clicks = 0;

        function adminTouch() {
            clicks++;
            if(clicks === 5) {
                if(prompt("Pass:") === "1043") {
                    document.getElementById('customerView').classList.add('hidden');
                    document.getElementById('adminView').classList.remove('hidden');
                }
            }
            setTimeout(() => { clicks = 0; }, 2000);
        }

        async function placeOrder() {
            const qtys = document.querySelectorAll('.qty');
            const units = document.querySelectorAll('.unit');
            let itemsList = []; let summary = [];

            qtys.forEach((q, i) => {
                if(q.value > 0) {
                    itemsList.push({name: q.dataset.name, qty: parseFloat(q.value), unit: units[i].value});
                    summary.push(`${q.dataset.name}: ${q.value}${units[i].value}`);
                }
            });

            if(itemsList.length === 0) return alert("Select items!");

            const data = {
                orderID: "V-"+Date.now().toString().slice(-4),
                name: document.getElementById('name').value,
                phone: document.getElementById('phone').value,
                location: document.getElementById('loc').value,
                coupon: document.getElementById('coupon').value,
                itemsList: itemsList,
                itemsSummary: summary.join(", ")
            };

            fetch(scriptURL, {method: 'POST', mode: 'no-cors', body: JSON.stringify(data)});
            window.open(`https://wa.me/${myWhatsApp}?text=Order ID: ${data.orderID}%0AItems: ${data.itemsSummary}`);
        }
    </script>
</body>
</html>
