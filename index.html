<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>विश्वम डेअरी - Smart Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #f1f5f9; font-family: sans-serif; }
        .card { background: white; border-radius: 16px; padding: 15px; margin-bottom: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .hidden { display: none; }
        .btn-primary { background: #1e40af; color: white; padding: 15px; border-radius: 12px; width: 100%; font-weight: bold; }
        .error-field { border: 2px solid #ef4444 !important; }
    </style>
</head>
<body class="p-4 pb-10">

    <div class="bg-blue-800 text-white p-6 rounded-2xl text-center mb-4 shadow-lg" onclick="adminTouch()">
        <h1 class="text-2xl font-black">VISHVAM DAIRY</h1>
        <p id="rateStatus" class="text-[10px] font-bold text-yellow-400">दर लोड होत आहेत...</p>
    </div>

    <div id="customerView">
        <div class="card">
            <h2 class="font-bold text-gray-700 mb-4 border-b pb-2">🛒 उत्पादने निवडा</h2>
            <div id="itemsList" class="space-y-4">
                <script>
                    const products = [
                        { name: "दूध (Milk)", units: ["L", "ml"] },
                        { name: "पनीर (Paneer)", units: ["kg", "gm"] },
                        { name: "दही (Curd)", units: ["kg", "gm", "L"] },
                        { name: "तूप (Ghee)", units: ["kg", "gm"] },
                        { name: "लस्सी (Lassi)", units: ["ml", "Unit"] },
                        { name: "ताक (Buttermilk)", units: ["L", "ml"] }
                    ];
                    document.write(products.map(p => `
                        <div class="flex items-center gap-2 border-b pb-2">
                            <span class="w-1/3 text-sm font-bold">${p.name}</span>
                            <input type="number" class="w-1/4 p-2 border rounded-lg qty" data-name="${p.name}" placeholder="0" oninput="updateTotal()">
                            <select class="w-1/4 p-2 border rounded-lg unit" onchange="updateTotal()">
                                ${p.units.map(u => `<option value="${u}">${u}</option>`).join('')}
                            </select>
                        </div>
                    `).join(''));
                </script>
            </div>
        </div>

        <div class="card bg-blue-50">
            <div class="flex justify-between items-center mb-2">
                <span class="font-bold">अंदाजित एकूण:</span>
                <span id="displayTotal" class="text-xl font-black">₹ 0.00</span>
            </div>
            <input type="text" id="coupon" placeholder="कूपन कोड" class="w-full p-2 border rounded text-center uppercase font-bold">
        </div>

        <div class="card space-y-3">
            <input type="text" id="cust_name" placeholder="तुमचे नाव (अनिवार्य)" class="w-full p-3 border rounded-xl">
            <input type="number" id="cust_phone" placeholder="मोबाईल नंबर (अनिवार्य)" class="w-full p-3 border rounded-xl">
            <textarea id="cust_loc" placeholder="पत्ता" class="w-full p-3 border rounded-xl"></textarea>
        </div>

        <button id="orderBtn" onclick="placeOrder()" class="btn-primary shadow-lg">🚀 ऑर्डर कन्फर्म करा</button>
    </div>

    <div id="adminView" class="hidden text-center p-8 card border-2 border-blue-500">
        <h2 class="font-bold text-xl mb-4 text-blue-800">मालक डॅशबोर्ड</h2>
        <a id="sheetLink" href="#" target="_blank" class="block bg-black text-white p-4 rounded-xl mb-4 font-bold">📊 सर्व ऑर्डर्स पहा</a>
        <button onclick="location.reload()" class="underline text-gray-500">बाहेर पडा</button>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbyUnzYA9-E4gTaV1nCYGnIz4f2T2IRIHsor9ie7dCxPuSZR62GPYnYOtzMKWgKutLQ67Q/exec'; 
        const myWhatsApp = '918805223290';
        const mySheetLink = 'https://docs.google.com/spreadsheets/u/0/d/1616EczZGBg1gpj83v4GkQUm3IAvLmhTX2VqBinKnjzo/htmlview';
        
        let baseRates = {}; 

        async function fetchRates() {
            try {
                const response = await fetch(scriptURL);
                baseRates = await response.json();
                document.getElementById('rateStatus').innerText = "✅ दर अपडेट झाले आहेत";
                document.getElementById('rateStatus').style.color = "#4ade80";
            } catch (e) {
                document.getElementById('rateStatus').innerText = "❌ दर लोड झाले नाहीत";
            }
        }

        function updateTotal() {
            let total = 0;
            const qtys = document.querySelectorAll('.qty');
            const units = document.querySelectorAll('.unit');
            qtys.forEach((q, i) => {
                let val = parseFloat(q.value) || 0;
                let unit = units[i].value;
                let rate = baseRates[q.dataset.name] || 0;
                if (unit === "gm" || unit === "ml") val /= 1000;
                total += (val * rate);
            });
            document.getElementById('displayTotal').innerText = "₹ " + total.toFixed(2);
        }

        let clicks = 0;
        function adminTouch() {
            clicks++;
            if(clicks === 5) {
                if(prompt("Password:") === "1234") {
                    document.getElementById('customerView').classList.add('hidden');
                    document.getElementById('adminView').classList.remove('hidden');
                }
                clicks = 0;
            }
            setTimeout(() => { clicks = 0; }, 2000);
        }

        async function placeOrder() {
            const name = document.getElementById('cust_name').value.trim();
            const phone = document.getElementById('cust_phone').value.trim();
            
            // Validation: नाव आणि नंबर नसेल तर थांबवणे
            if(!name) { alert("नाव टाकणे आवश्यक आहे!"); return; }
            if(phone.length < 10) { alert("योग्य मोबाईल नंबर टाका!"); return; }

            let items = []; let summary = [];
            document.querySelectorAll('.qty').forEach((q, i) => {
                let val = parseFloat(q.value);
                if(val > 0) {
                    let unit = document.querySelectorAll('.unit')[i].value;
                    items.push({name: q.dataset.name, qty: val, unit: unit});
                    summary.push(`${q.dataset.name}: ${val}${unit}`);
                }
            });

            if(items.length === 0) return alert("किमान एक तरी वस्तू निवडा!");

            const data = {
                orderID: "V-" + Date.now().toString().slice(-4),
                name: name,
                phone: phone,
                location: document.getElementById('cust_loc').value,
                coupon: document.getElementById('coupon').value,
                itemsList: items,
                itemsSummary: summary.join(", ")
            };

            const orderBtn = document.getElementById('orderBtn');
            orderBtn.disabled = true;
            orderBtn.innerText = "प्रोसेस होत आहे...";

            await fetch(scriptURL, {method: 'POST', mode: 'no-cors', body: JSON.stringify(data)});

            let msg = `*नवीन ऑर्डर - विश्वम डेअरी*%0A--------------------------%0A*ID:* ${data.orderID}%0A*नाव:* ${data.name}%0A*ऑर्डर:* ${data.itemsSummary}%0A*एकूण बिल:* ${document.getElementById('displayTotal').innerText}%0A*पत्ता:* ${data.location}%0A--------------------------`;
            window.open(`https://wa.me/${myWhatsApp}?text=${msg}`);
            
            setTimeout(() => { location.reload(); }, 3000);
        }

        document.getElementById('sheetLink').href = mySheetLink;
        fetchRates();
    </script>
</body>
</html>
