<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>विश्वम डेअरी - Smart Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #f1f5f9; font-family: sans-serif; }
        .card { background: white; border-radius: 16px; padding: 15px; margin-bottom: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .hidden { display: none; }
        .btn-primary { background: #1e40af; color: white; padding: 15px; border-radius: 12px; width: 100%; font-weight: bold; font-size: 18px; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .loading { font-size: 10px; color: #ef4444; font-weight: bold; }
    </style>
</head>
<body class="p-4 pb-10">

    <div class="bg-blue-800 text-white p-6 rounded-2xl text-center mb-4 shadow-lg active:opacity-90" onclick="adminTouch()">
        <h1 class="text-2xl font-black tracking-wider uppercase">VISHVAM DAIRY</h1>
        <p class="text-[10px] text-blue-200 uppercase font-bold tracking-[0.2em]">Purity You Can Trust</p>
    </div>

    <div id="customerView">
        <div class="card">
            <h2 class="font-bold text-gray-700 mb-4 border-b pb-2 flex justify-between items-center">
                <span>🛒 उत्पादने निवडा</span>
                <span id="rateStatus" class="loading">दर लोड होत आहेत...</span>
            </h2>
            
            <div id="itemsList" class="space-y-5">
                <script>
                    const products = [
                        { name: "दूध (Milk)", units: ["L", "ml"] },
                        { name: "पनीर (Paneer)", units: ["kg", "gm"] },
                        { name: "दही (Curd)", units: ["kg", "gm", "L"] },
                        { name: "लस्सी (Lassi)", units: ["ml", "Unit"] },
                        { name: "ताक (Buttermilk)", units: ["L", "ml"] },
                        { name: "तूप (Ghee)", units: ["kg", "gm"] }
                    ];

                    document.write(products.map(p => `
                        <div class="flex items-center gap-3 border-b border-gray-100 pb-3">
                            <span class="w-1/3 text-sm font-bold text-gray-800">${p.name}</span>
                            <input type="number" step="any" class="w-1/4 p-2 border rounded-lg qty bg-gray-50 text-center outline-none focus:ring-2 focus:ring-blue-400" data-name="${p.name}" placeholder="0" oninput="updateTotal()">
                            <select class="w-1/4 p-2 border rounded-lg unit bg-white text-xs font-semibold" onchange="updateTotal()">
                                ${p.units.map(u => `<option value="${u}">${u}</option>`).join('')}
                            </select>
                        </div>
                    `).join(''));
                </script>
            </div>
        </div>

        <div class="card bg-gradient-to-br from-blue-50 to-white border border-blue-100">
            <div class="flex justify-between items-center mb-3">
                <span class="font-bold text-blue-800">अंदाजित एकूण:</span>
                <span id="displayTotal" class="text-2xl font-black text-blue-900">₹ 0.00</span>
            </div>
            <input type="text" id="coupon" placeholder="कूपन कोड (असल्यास)" class="w-full p-3 border rounded-xl text-center font-black uppercase border-blue-200 text-blue-700">
        </div>

        <div class="card space-y-3">
            <input type="text" id="name" placeholder="तुमचे नाव" class="w-full p-3 border rounded-xl bg-gray-50 outline-none">
            <input type="text" id="phone" placeholder="मोबाईल नंबर" class="w-full p-3 border rounded-xl bg-gray-50 outline-none">
            <textarea id="loc" placeholder="डिलिव्हरी पत्ता" class="w-full p-3 border rounded-xl bg-gray-50 outline-none min-h-[80px]"></textarea>
        </div>

        <button onclick="placeOrder()" class="btn-primary shadow-blue-600/30 shadow-xl active:scale-95 transition-all">
            🚀 ऑर्डर कन्फर्म करा
        </button>
    </div>

    <div id="adminView" class="hidden text-center p-8 card border-2 border-blue-500">
        <h2 class="font-bold text-xl mb-6">मालक विभाग (Admin)</h2>
        <a id="sheetLink" href="#" target="_blank" class="block bg-black text-white p-4 rounded-xl mb-4 font-bold">📊 सर्व ऑर्डर्स पहा</a>
        <button onclick="location.reload()" class="text-gray-500 underline">Logout</button>
    </div>

    <script>
        // --- SETTINGS ---
        const scriptURL = 'https://script.google.com/macros/s/AKfycbx3lPveH7jN0-tITfH-OyEmIIZeP3UxYAT_xAKU9KmVmSmVn3p7sDF6OibFV6Lv2ByJ_A/exec'; 
        const myWhatsApp = '918805223290';
        const mySheetLink = 'TUMCHI_GOOGLE_SHEET_URL';
        
        let baseRates = {}; // Sheet madhun yeil

        // 1. Google Sheet madhun runtime rates aan-ne
        async function fetchRates() {
            try {
                const response = await fetch(scriptURL);
                baseRates = await response.json();
                document.getElementById('rateStatus').innerText = "✅ दर अपडेट झाले";
                document.getElementById('rateStatus').classList.remove('loading');
                document.getElementById('rateStatus').style.color = "green";
            } catch (error) {
                document.getElementById('rateStatus').innerText = "❌ दर लोड झाले नाहीत";
            }
        }

        function updateTotal() {
            let total = 0;
            const qtys = document.querySelectorAll('.qty');
            const units = document.querySelectorAll('.unit');
            qtys.forEach((q, i) => {
                let val = parseFloat(q.value) || 0;
                let unit = units[i].value;
                let name = q.dataset.name;
                let rate = baseRates[name] || 0;
                
                if (unit === "gm" || unit === "ml") val = val / 1000;
                total += (val * rate);
            });
            document.getElementById('displayTotal').innerText = "₹ " + total.toLocaleString('en-IN', {minimumFractionDigits: 2});
        }

        let clicks = 0;
        function adminTouch() {
            clicks++;
            if(clicks === 5) {
                if(prompt("Pass:") === "1234") {
                    document.getElementById('customerView').classList.add('hidden');
                    document.getElementById('adminView').classList.remove('hidden');
                }
            }
            setTimeout(() => { clicks = 0; }, 2000);
        }

        async function placeOrder() {
            const qtys = document.querySelectorAll('.qty');
            const units = document.querySelectorAll('.unit');
            let itemsList = []; let summary = [];

            qtys.forEach((q, i) => {
                if(parseFloat(q.value) > 0) {
                    itemsList.push({name: q.dataset.name, qty: parseFloat(q.value), unit: units[i].value});
                    summary.push(`${q.dataset.name}: ${q.value}${units[i].value}`);
                }
            });

            if(itemsList.length === 0) return alert("Items निवडा!");
            if(!document.getElementById('name').value) return alert("नाव टाका!");

            const data = {
                orderID: "V-" + Date.now().toString().slice(-4),
                name: document.getElementById('name').value,
                phone: document.getElementById('phone').value,
                location: document.getElementById('loc').value,
                coupon: document.getElementById('coupon').value,
                itemsList: itemsList,
                itemsSummary: summary.join(", ")
            };

            fetch(scriptURL, {method: 'POST', mode: 'no-cors', body: JSON.stringify(data)});

            let msg = `*नवीन ऑर्डर - विश्वम डेअरी*%0A--------------------------%0A*ID:* ${data.orderID}%0A*नाव:* ${data.name}%0A*ऑर्डर:* ${data.itemsSummary}%0A*एकूण बिल:* ${document.getElementById('displayTotal').innerText}%0A--------------------------%0A_धन्यवाद!_`;
            window.open(`https://wa.me/${myWhatsApp}?text=${msg}`);
        }

        document.getElementById('sheetLink').href = mySheetLink;
        fetchRates(); // Page load hotach rates aan-ne
    </script>
</body>
</html>
