<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>विश्वम डेअरी - Smart Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #f1f5f9; font-family: sans-serif; }
        .card { background: white; border-radius: 16px; padding: 15px; margin-bottom: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .hidden { display: none; }
        .btn-primary { background: #1e40af; color: white; padding: 15px; border-radius: 12px; width: 100%; font-weight: bold; font-size: 18px; }
    </style>
</head>
<body class="p-4">

    <div class="bg-blue-800 text-white p-6 rounded-2xl text-center mb-4" onclick="adminTouch()">
        <h1 class="text-2xl font-black">VISHVAM DAIRY</h1>
        <p id="rateStatus" class="text-[10px] text-blue-200">दर लोड होत आहेत...</p>
    </div>

    <div id="customerView">
        <div class="card">
            <h2 class="font-bold text-gray-700 mb-4 border-b pb-2">🛒 उत्पादने निवडा</h2>
            <div id="itemsList" class="space-y-4">
                <script>
                    const products = [
                        { name: "दूध (Milk)", units: ["L", "ml"] },
                        { name: "पनीर (Paneer)", units: ["kg", "gm"] },
                        { name: "दही (Curd)", units: ["kg", "gm", "L"] },
                        { name: "लस्सी (Lassi)", units: ["ml", "Unit"] },
                        { name: "ताक (Buttermilk)", units: ["L", "ml"] },
                        { name: "तूप (Ghee)", units: ["kg", "gm"] }
                    ];
                    document.write(products.map(p => `
                        <div class="flex items-center gap-2 border-b pb-2">
                            <span class="w-1/3 text-sm font-bold">${p.name}</span>
                            <input type="number" class="w-1/4 p-2 border rounded qty" data-name="${p.name}" placeholder="0" oninput="updateTotal()">
                            <select class="w-1/4 p-2 border rounded unit" onchange="updateTotal()">${p.units.map(u => `<option value="${u}">${u}</option>`).join('')}</select>
                        </div>
                    `).join(''));
                </script>
            </div>
        </div>

        <div class="card bg-blue-50">
            <div class="flex justify-between items-center mb-2">
                <span class="font-bold">अंदाजित एकूण:</span>
                <span id="displayTotal" class="text-xl font-black">₹ 0.00</span>
            </div>
            <input type="text" id="coupon" placeholder="कूपन कोड" class="w-full p-2 border rounded text-center font-bold uppercase">
        </div>

        <div class="card space-y-2">
            <input type="text" id="name" placeholder="तुमचे नाव" class="w-full p-2 border rounded">
            <input type="text" id="phone" placeholder="मोबाईल नंबर" class="w-full p-2 border rounded">
            <textarea id="loc" placeholder="पत्ता" class="w-full p-2 border rounded"></textarea>
        </div>
        <button onclick="placeOrder()" class="btn-primary">ऑर्डर कन्फर्म करा</button>
    </div>

    <div id="adminView" class="hidden text-center p-8 card">
        <h2 class="font-bold mb-4">मालक विभाग</h2>
        <a id="sheetLink" href="#" target="_blank" class="block bg-black text-white p-3 rounded mb-2">सर्व ऑर्डर्स पहा</a>
        <button onclick="location.reload()" class="underline">Logout</button>
    </div>

    <script>
        // खालील ३ गोष्टी बदला
        const scriptURL = 'तुमची_नवीन_APPS_SCRIPT_URL'; 
        const myWhatsApp = '918805223290';
        const mySheetLink = 'तुमच्या_GOOGLE_SHEET_ची_LINK';

        let baseRates = {}; 

        async function fetchRates() {
            try {
                const response = await fetch(scriptURL);
                baseRates = await response.json();
                document.getElementById('rateStatus').innerText = "✅ दर अपडेट झाले";
                document.getElementById('rateStatus').style.color = "lightgreen";
            } catch (e) { document.getElementById('rateStatus').innerText = "❌ दर लोड झाले नाहीत"; }
        }

        function updateTotal() {
            let total = 0;
            document.querySelectorAll('.qty').forEach((q, i) => {
                let val = parseFloat(q.value) || 0;
                let unit = document.querySelectorAll('.unit')[i].value;
                let rate = baseRates[q.dataset.name] || 0;
                if (unit === "gm" || unit === "ml") val /= 1000;
                total += (val * rate);
            });
            document.getElementById('displayTotal').innerText = "₹ " + total.toFixed(2);
        }

        let clicks = 0;
        function adminTouch() {
            clicks++;
            if(clicks === 5) {
                if(prompt("Pass:") === "1234") {
                    document.getElementById('customerView').classList.add('hidden');
                    document.getElementById('adminView').classList.remove('hidden');
                }
            }
            setTimeout(() => { clicks = 0; }, 2000);
        }

        async function placeOrder() {
            let items = []; let summary = [];
            document.querySelectorAll('.qty').forEach((q, i) => {
                if(parseFloat(q.value) > 0) {
                    let unit = document.querySelectorAll('.unit')[i].value;
                    items.push({name: q.dataset.name, qty: parseFloat(q.value), unit: unit});
                    summary.push(`${q.dataset.name}: ${q.value}${unit}`);
                }
            });

            const data = {
                orderID: "V-" + Date.now().toString().slice(-4),
                name: document.getElementById('name').value,
                phone: document.getElementById('phone').value,
                location: document.getElementById('loc').value,
                coupon: document.getElementById('coupon').value,
                itemsList: items,
                itemsSummary: summary.join(", ")
            };

            fetch(scriptURL, {method: 'POST', mode: 'no-cors', body: JSON.stringify(data)});
            let msg = `*नवीन ऑर्डर - विश्वम डेअरी*%0A--------------------------%0A*ID:* ${data.orderID}%0A*नाव:* ${data.name}%0A*ऑर्डर:* ${data.itemsSummary}%0A*एकूण बिल:* ${document.getElementById('displayTotal').innerText}%0A--------------------------%0A_धन्यवाद!_`;
            window.open(`https://wa.me/${myWhatsApp}?text=${msg}`);
        }

        document.getElementById('sheetLink').href = mySheetLink;
        fetchRates();
    </script>
</body>
</html>
